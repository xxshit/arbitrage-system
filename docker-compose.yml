services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: arbitrage_hub
      MYSQL_USER: arbi
      MYSQL_PASSWORD: change-before-deploying
      MYSQL_ROOT_PASSWORD: change-root-before-deploying
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pchange-root-before-deploying"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  mysql_data:
